<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker PRO - Gabriel</title>
    <style>
        :root { --primary: #004dc5; --bg: #0a0a0a; --card: #141414; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        /* Barra de Busca */
        .search-bar { width: 100%; max-width: 500px; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #111; color: white; margin: 0 auto 30px auto; display: block; text-align: center; }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        
        /* Card Estilizado (Igual aos seus prints) */
        .card { background: var(--card); border-radius: 15px; width: 280px; padding: 15px; border: 1px solid #222; position: relative; }
        .badge { background: var(--primary); color: white; padding: 3px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; position: absolute; top: 15px; left: 15px; z-index: 5; text-transform: uppercase; }
        
        /* Container do GIF (Oculto por padrão, aparece com flex) */
        .img-container { background: #000; border-radius: 10px; height: 180px; display: none; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; border: 1px solid #1a1a1a; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; display: block; } /* 'contain' para o GIF inteiro, 'block' para garantir visibilidade */
        
        .title { font-size: 16px; font-weight: bold; margin-bottom: 15px; text-align: center; display: block; }
        
        /* Área de Pesos e Metas */
        .row { display: flex; gap: 8px; margin-bottom: 12px; }
        .col { flex: 1; text-align: center; }
        .col label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; }
        .col input { width: 85%; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: white; padding: 10px; text-align: center; font-size: 14px; }

        /* Botões */
        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; text-transform: uppercase; margin-bottom: 8px; }
        .btn-view { background: #222; color: #fff; border: 1px solid #444; width: 100%; padding: 10px; border-radius: 8px; font-size: 11px; cursor: pointer; margin-bottom: 8px; font-weight: bold; }
        .btn-timer { background: transparent; color: #888; border: 1px solid #333; width: 100%; padding: 8px; border-radius: 8px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
    </style>
</head>
<body>

<input type="text" id="busca" class="search-bar" placeholder="Buscar exercício..." oninput="render()">
<div class="container" id="lista"></div>

<script>
    // LISTA COM OS CAMINHOS DOS GIFs NA SUA PASTA 'img'
    const maquinas = [
        { nome: "Supino Reto (Halter)", grupo: "chest", foto: "img/supino.gif" },
        { nome: "Puxada Alta", grupo: "back", foto: "img/puxada.gif" },
        { nome: "Leg Press 45", grupo: "upper legs", foto: "img/leg45.gif" },
        { nome: "Rosca Direta", grupo: "upper arms", foto: "img/rosca.gif" },
        { nome: "Tríceps Corda", grupo: "upper arms", foto: "img/triceps.gif" }
    ];

    function render() {
        const lista = document.getElementById("lista");
        const termo = document.getElementById("busca").value.toLowerCase();
        lista.innerHTML = "";

        // Gera um número aleatório único para esta renderização para quebrar o cache
        const cacheBuster = new Date().getTime();

        maquinas.filter(m => m.nome.toLowerCase().includes(termo)).forEach((m, index) => {
            // Recupera pesos salvos individualmente
            const peso = localStorage.getItem("gym_" + m.nome + "_p") || 0;
            const meta = localStorage.getItem("gym_" + m.nome + "_m") || 0;
            
            // Adiciona o cache buster ao link do GIF
            const gifUrlWithCacheBuster = `${m.foto}?v=${cacheBuster}`;

            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="badge">${m.grupo}</div>
                <div class="img-container" id="cont-${index}">
                    <img src="${gifUrlWithCacheBuster}" id="img-${index}" loading="lazy">
                </div>
                <span class="title">${m.nome}</span>
                <div class="row">
                    <div class="col"><label>Peso (kg)</label><input type="number" id="p-${index}" value="${peso}"></div>
                    <div class="col"><label>Meta (kg)</label><input type="number" id="m-${index}" value="${meta}"></div>
                </div>
                <button class="btn-save" onclick="salvar(${index}, '${m.nome}')">SALVAR PROGRESSO</button>
                <button class="btn-view" onclick="toggleFoto(${index})">👁️ VER EXECUÇÃO</button>
                <button id="t-${index}" class="btn-timer" onclick="timer(60, 't-${index}')">⏱️ DESCANSO 60S</button>
            `;
            lista.appendChild(card);
        });
    }

    // Função para mostrar/esconder o GIF
    function toggleFoto(index) {
        const container = document.getElementById(`cont-${index}`);
        const isFlex = container.style.display === 'flex';
        container.style.display = isFlex ? 'none' : 'flex';
        
        // Se estivermos mostrando o GIF, forçamos o recarregamento dele para garantir a animação
        if (!isFlex) {
            const img = document.getElementById(`img-${index}`);
            const currentSrc = img.src.split('?v=')[0]; // Pega o caminho base
            img.src = `${currentSrc}?v=${new Date().getTime()}`; // Atualiza o cache buster
        }
    }

    // Salva os pesos no navegador (LocalStorage)
    function salvar(idx, nome) {
        const p = document.getElementById("p-" + idx).value;
        const m = document.getElementById("m-" + idx).value;
        localStorage.setItem("gym_" + nome + "_p", p);
        localStorage.setItem("gym_" + nome + "_m", m);
        alert("Salvo com sucesso!");
    }

    // Cronômetro de descanso
    function timer(seg, btnId) {
        const btn = document.getElementById(btnId);
        let t = seg; 
        btn.disabled = true;
        const interval = setInterval(() => {
            btn.innerText = `⏳ ${t}s`; 
            t--;
            if (t < 0) {
                clearInterval(interval);
                btn.innerText = "⏱️ DESCANSO 60S"; 
                btn.disabled = false;
            }
        }, 1000);
    }

    render();
</script>
</body>
</html>
