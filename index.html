<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="manifest" href="manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker PRO</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script>
    if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
    }
    </script>

    <style>
        body { font-family: Arial; background: #0f0f0f; color: white; text-align: center; }
        input { padding: 6px; border-radius: 8px; border: none; margin: 3px; width: 70px; background: #333; color: white; }
        button { padding: 6px 12px; margin: 3px; border: none; border-radius: 8px; background: #1f1f1f; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #333; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; }
        .card { background: #1a1a1a; padding: 15px; margin: 10px; border-radius: 12px; width: 270px; border: 1px solid #333; }
        #user-info { margin: 10px; font-size: 0.9em; color: #4285F4; }
        canvas { max-width: 100%; margin-top: 10px; }
    </style>
</head>

<body>

<h1>🏋️ Gym Tracker PRO</h1>

<div id="auth-section">
    <div id="user-info">Verificando login...</div>
    <button onclick="login()">🔐 Login com Google</button>
    <button onclick="logout()" id="btn-logout" style="display:none; background: #b3261e;">🚪 Sair</button>
</div>

<div id="app">
    <input type="text" id="busca" placeholder="Buscar..." oninput="render()" style="width: 80%; max-width: 400px; margin: 20px 0;">

    <div style="margin-bottom: 20px;">
        <button onclick="setGrupo('todos')">Todos</button>
        <button onclick="setGrupo('peito')">Peito</button>
        <button onclick="setGrupo('costas')">Costas</button>
        <button onclick="setGrupo('biceps')">Bíceps</button>
        <button onclick="setGrupo('triceps')">Tríceps</button>
        <button onclick="setGrupo('perna')">Perna</button>
        <button onclick="setGrupo('ombro')">Ombro</button>
        <button onclick="setGrupo('peso_livre')">Peso Livre</button>
        <button onclick="toggleFav()">⭐ Favoritos</button>
        <button onclick="resetHidden()">🔄 Restaurar</button>
    </div>

    <div class="container" id="lista"></div>
</div>

<script>
// --- CONFIGURAÇÃO E LOGIN ---
const firebaseConfig = {
    apiKey: "AIzaSyAHI75Au3Ai4v751Jx8MNe6OGuyYwfmg5w",
    authDomain: "gym-tracker-3e228.firebaseapp.com",
    projectId: "gym-tracker-3e228"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

let usuario = localStorage.getItem("user") || "convidado";

function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithRedirect(provider);
}

function logout() {
    auth.signOut().then(() => {
        localStorage.removeItem("user");
        location.reload();
    });
}

auth.onAuthStateChanged(user => {
    const info = document.getElementById("user-info");
    const btnO = document.getElementById("btn-logout");
    
    if (user) {
        usuario = user.uid;
        localStorage.setItem("user", usuario);
        info.innerText = "✅ Logado: " + user.email;
        btnO.style.display = "inline-block";
    } else {
        usuario = "convidado";
        info.innerText = "⚠️ Modo Offline (Local)";
        btnO.style.display = "none";
    }
    render();
});

// --- LÓGICA DO APP ---
let mostrarFav = false;
let grupoAtual = "todos";

function gerarId(nome) {
    return nome.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"_").replace(/[^\w]/g,"");
}

function getKey(nome) {
    return usuario + "_" + nome;
}

function setGrupo(g) {
    grupoAtual = g;
    mostrarFav = false;
    render();
}

function toggleFav() {
    mostrarFav = !mostrarFav;
    render();
}

function resetHidden() {
    Object.keys(localStorage).forEach(k => {
        if (k.includes("_hidden")) localStorage.removeItem(k);
    });
    render();
}

const maquinas = [
    /* ========= SEUS EXERCÍCIOS ========= */
    {nome:"Supino Reto Máquina",grupo:"peito"},
    {nome:"Supino Inclinado Máquina",grupo:"peito"},
    {nome:"Puxada Alta",grupo:"costas"},
    {nome:"Remada Baixa",grupo:"costas"},
    {nome:"Rosca Direta Barra",grupo:"biceps"},
    {nome:"Rosca Martelo",grupo:"biceps"},
    {nome:"Tríceps Polia",grupo:"triceps"},
    {nome:"Tríceps Corda",grupo:"triceps"},
    {nome:"Leg Press 45°",grupo:"perna"},
    {nome:"Cadeira Extensora",grupo:"perna"},
    {nome:"Elevação Lateral Halter",grupo:"ombro"},
    {nome:"Desenvolvimento Halter",grupo:"ombro"},
    {nome:"Esteira",grupo:"cardio"},
    {nome:"Flexão de Braço",grupo:"peso_livre"}
    // ... adicione os outros 500 conforme sua lista original aqui
];

function render() {
    const lista = document.getElementById("lista");
    const busca = document.getElementById("busca").value.toLowerCase();
    if (!lista) return;
    lista.innerHTML = "";

    maquinas
    .filter(m => (grupoAtual === "todos" || m.grupo === grupoAtual))
    .filter(m => m.nome.toLowerCase().includes(busca))
    .forEach(m => {
        const key = getKey(m.nome);
        if (localStorage.getItem(key + "_hidden") === "true") return;

        const fav = localStorage.getItem(key + "_fav") === "true";
        if (mostrarFav && !fav) return;

        const peso = localStorage.getItem(key) || "";
        const hist = JSON.parse(localStorage.getItem(key + "_hist")) || [];
        const meta = localStorage.getItem(key + "_meta") || "";
        const recorde = hist.length ? Math.max(...hist) : 0;
        const id = gerarId(m.nome);

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <h3>${m.nome} ${fav ? "⭐" : ""}</h3>
            <p>🏆 Recorde: ${recorde}kg</p>
            <input id="${id}" type="number" value="${peso}" placeholder="Peso">
            <button onclick="salvar('${m.nome}')">Salvar</button>
            <br>
            <input id="meta-${id}" value="${meta}" placeholder="Meta" style="margin-top:5px; width: 140px;">
            <button onclick="salvarMeta('${m.nome}')">🎯</button>
            <br>
            <div style="margin-top:10px">
                <button onclick="favoritar('${m.nome}')">⭐</button>
                <button onclick="ocultar('${m.nome}')">❌</button>
                <button onclick="verGrafico('${m.nome}')">📈</button>
            </div>
            <canvas id="graf-${id}" style="display:none"></canvas>
        `;
        lista.appendChild(card);
    });
}

function salvar(nome) {
    const val = document.getElementById(gerarId(nome)).value;
    if (!val) return;
    const key = getKey(nome);
    localStorage.setItem(key, val);
    let hist = JSON.parse(localStorage.getItem(key + "_hist")) || [];
    hist.push(Number(val));
    localStorage.setItem(key + "_hist", JSON.stringify(hist));
    render();
}

function salvarMeta(nome) {
    const val = document.getElementById("meta-" + gerarId(nome)).value;
    localStorage.setItem(getKey(nome) + "_meta", val);
    render();
}

function favoritar(nome) {
    const key = getKey(nome) + "_fav";
    const atual = localStorage.getItem(key) === "true";
    localStorage.setItem(key, !atual);
    render();
}

function ocultar(nome) {
    localStorage.setItem(getKey(nome) + "_hidden", "true");
    render();
}

function verGrafico(nome) {
    const id = gerarId(nome);
    const canvas = document.getElementById("graf-" + id);
    const hist = JSON.parse(localStorage.getItem(getKey(nome) + "_hist")) || [];

    if (hist.length === 0) { alert("Sem dados para gerar gráfico."); return; }

    canvas.style.display = "block";
    new Chart(canvas, {
        type: 'line',
        data: {
            labels: hist.map((_, i) => (i + 1) + "º"),
            datasets: [{
                label: "Peso (kg)",
                data: hist,
                borderColor: '#4285F4',
                tension: 0.1
            }]
        }
    });
}

render();
</script>

</body>
</html>
