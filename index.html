<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker PRO - Gabriel</title>
    
    <style>
        :root { --primary: #4285F4; --bg: #121212; --card: #1e1e1e; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        
        .search-bar { width: 100%; max-width: 400px; padding: 12px; border-radius: 25px; border: 1px solid var(--primary); background: #222; color: white; margin: 0 auto 20px auto; display: block; }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        
        /* Card Estilizado */
        .card { background: var(--card); border-radius: 20px; width: 310px; padding: 15px; border: 1px solid #333; position: relative; }
        .badge { background: var(--primary); color: white; padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: bold; position: absolute; top: 10px; left: 10px; z-index: 5; text-transform: uppercase; }
        
        /* Container de Imagem para GitHub Pages */
        .img-container { background: white; border-radius: 15px; height: 180px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; }
        
        .title { font-size: 18px; font-weight: bold; margin-bottom: 15px; text-align: center; display: block; }
        
        .row { display: flex; gap: 10px; margin-bottom: 15px; }
        .col { flex: 1; text-align: center; }
        .col label { display: block; font-size: 12px; color: #aaa; margin-bottom: 5px; }
        .col input { width: 85%; background: #2a2a2a; border: 1px solid #444; border-radius: 10px; color: white; padding: 12px; text-align: center; font-size: 16px; }

        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-save:active { transform: scale(0.98); }
        .btn-timer { background: #2a2a2a; color: #888; border: 1px solid #444; width: 100%; padding: 10px; border-radius: 12px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

<input type="text" id="busca" class="search-bar" placeholder="Buscar exercício..." oninput="render()">
<div class="container" id="lista"></div>

<script>
    const maquinas = [
        {id:"0289", nome:"Supino Reto (Halter)", grupo:"chest"},
        {id:"0047", nome:"Puxada Alta", grupo:"back"},
        {id:"0599", nome:"Leg Press 45", grupo:"upper legs"},
        {id:"0652", nome:"Rosca Direta", grupo:"upper arms"},
        {id:"0822", nome:"Tríceps Corda", grupo:"upper arms"}
    ];

    function render() {
        const lista = document.getElementById("lista");
        const termo = document.getElementById("busca").value.toLowerCase();
        lista.innerHTML = "";

        maquinas.filter(m => m.nome.toLowerCase().includes(termo)).forEach(m => {
            const peso = localStorage.getItem("gym_" + m.id + "_p") || 0;
            const meta = localStorage.getItem("gym_" + m.id + "_m") || 0;
            
            // Link otimizado para web (GitHub Pages aceita esse link sem bloqueios)
            const imgUrl = `https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/${m.id}/visual.gif`;

            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="badge">${m.grupo}</div>
                <div class="img-container">
                    <img src="${imgUrl}" loading="lazy" onerror="this.src='https://via.placeholder.com/300x200/444/fff?text=Sem+Foto'">
                </div>
                <span class="title">${m.nome}</span>
                <div class="row">
                    <div class="col"><label>Peso (kg)</label><input type="number" id="p-${m.id}" value="${peso}"></div>
                    <div class="col"><label>Meta (kg)</label><input type="number" id="m-${m.id}" value="${meta}"></div>
                </div>
                <button class="btn-save" onclick="salvar('${m.id}')">SALVAR PROGRESSO</button>
                <button id="t-${m.id}" class="btn-timer" onclick="timer(60, 't-${m.id}')">⏱️ Descanso 60s</button>
            `;
            lista.appendChild(card);
        });
    }

    function salvar(id) {
        localStorage.setItem("gym_" + id + "_p", document.getElementById("p-" + id).value);
        localStorage.setItem("gym_" + id + "_m", document.getElementById("m-" + id).value);
        alert("Salvo com sucesso!");
    }

    function timer(seg, btnId) {
        const btn = document.getElementById(btnId);
        let t = seg;
        btn.disabled = true;
        const interval = setInterval(() => {
            btn.innerText = `⏳ ${t}s`;
            t--;
            if (t < 0) {
                clearInterval(interval);
                btn.innerText = "⏱️ Descanso 60s";
                btn.disabled = false;
                alert("Tempo esgotado!");
            }
        }, 1000);
    }

    render();
</script>
</body>
</html>
