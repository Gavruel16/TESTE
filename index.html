<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker PRO</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <style>
        body { font-family: Arial, sans-serif; background: #0f0f0f; color: white; text-align: center; margin: 0; padding: 20px; }
        input { padding: 8px; border-radius: 8px; border: none; margin: 3px; width: 80px; background: #333; color: white; }
        button { padding: 10px 15px; margin: 5px; border: none; border-radius: 8px; background: #2a2a2a; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #444; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; }
        .card { background: #1a1a1a; padding: 15px; margin: 10px; border-radius: 12px; width: 280px; border: 1px solid #333; }
        #user-info { margin: 15px; font-size: 0.9em; color: #aaa; min-height: 1.2em; }
        .btn-google { background: #4285F4; color: white; border: none; }
        .btn-google:hover { background: #357ae8; }
        canvas { max-width: 100%; margin-top: 10px; background: #111; border-radius: 5px; }
    </style>
</head>
<body>

<h1>🏋️ Gym Tracker PRO</h1>

<div id="auth-section">
    <div id="user-info">Iniciando...</div>
    <button id="btn-login" class="btn-google" onclick="login()" style="display:none;">🔐 Entrar com Google</button>
    <button id="btn-logout" onclick="logout()" style="display:none;">🚪 Sair</button>
</div>

<div id="app">
    <input type="text" id="busca" placeholder="Buscar exercício..." oninput="render()" style="width: 85%; max-width: 400px; margin-bottom: 20px;">
    
    <div style="margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;">
        <button onclick="setGrupo('todos')">Todos</button>
        <button onclick="setGrupo('peito')">Peito</button>
        <button onclick="setGrupo('costas')">Costas</button>
        <button onclick="setGrupo('biceps')">Bíceps</button>
        <button onclick="setGrupo('triceps')">Tríceps</button>
        <button onclick="setGrupo('perna')">Perna</button>
        <button onclick="setGrupo('ombro')">Ombro</button>
        <button onclick="toggleFav()">⭐ Fav</button>
    </div>

    <div class="container" id="lista"></div>
</div>

<script>
// 1. CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyAHI75Au3Ai4v751Jx8MNe6OGuyYwfmg5w",
    authDomain: "gym-tracker-3e228.firebaseapp.com",
    projectId: "gym-tracker-3e228"
};

// Evita erro de inicialização duplicada
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
const auth = firebase.auth();

// Recupera o ID salvo para evitar o "flash" do modo offline
let usuario = localStorage.getItem("firebase_uid") || "convidado";

// 2. FUNÇÕES DE AUTENTICAÇÃO
function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithRedirect(provider);
}

function logout() {
    auth.signOut().then(() => {
        localStorage.removeItem("firebase_uid");
        location.reload();
    });
}

// CAPTURA O RETORNO DO REDIRECT (Fundamental para GitHub Pages)
auth.getRedirectResult().then((result) => {
    if (result.user) {
        usuario = result.user.uid;
        localStorage.setItem("firebase_uid", usuario);
        render();
    }
}).catch(error => {
    console.error("Erro no Redirect:", error);
    if(error.code === 'auth/unauthorized-domain') {
        alert("Erro: Domínio não autorizado no Console do Firebase!");
    }
});

// MONITOR DE ESTADO
auth.onAuthStateChanged(user => {
    const info = document.getElementById("user-info");
    const btnL = document.getElementById("btn-login");
    const btnO = document.getElementById("btn-logout");

    if (user) {
        usuario = user.uid;
        localStorage.setItem("firebase_uid", usuario);
        info.innerText = "Logado como: " + user.email;
        btnL.style.display = "none";
        btnO.style.display = "inline-block";
    } else {
        usuario = "convidado";
        localStorage.removeItem("firebase_uid");
        info.innerText = "Modo Offline (Dados locais)";
        btnL.style.display = "inline-block";
        btnO.style.display = "none";
    }
    render();
});

// 3. LÓGICA DO APP
let grupoAtual = "todos";
let mostrarFav = false;

// Adicione aqui sua lista completa de 500+ exercícios
const maquinas = [
    {nome:"Supino Reto Máquina",grupo:"peito"},
    {nome:"Supino Inclinado Máquina",grupo:"peito"},
    {nome:"Puxada Alta",grupo:"costas"},
    {nome:"Remada Baixa",grupo:"costas"},
    {nome:"Rosca Direta",grupo:"biceps"},
    {nome:"Tríceps Corda",grupo:"triceps"},
    {nome:"Leg Press 45°",grupo:"perna"},
    {nome:"Cadeira Extensora",grupo:"perna"},
    {nome:"Elevação Lateral",grupo:"ombro"},
    {nome:"Esteira",grupo:"cardio"}
];

function gerarId(nome) {
    return nome.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"_").replace(/[^\w]/g,"");
}

function getKey(nome) {
    return usuario + "_" + nome;
}

function setGrupo(g) { grupoAtual = g; mostrarFav = false; render(); }
function toggleFav() { mostrarFav = !mostrarFav; render(); }

function render() {
    const lista = document.getElementById("lista");
    const busca = document.getElementById("busca").value.toLowerCase();
    if (!lista) return;
    lista.innerHTML = "";

    maquinas
    .filter(m => (grupoAtual === "todos" || m.grupo === grupoAtual) && m.nome.toLowerCase().includes(busca))
    .forEach(m => {
        const key = getKey(m.nome);
        if (localStorage.getItem(key + "_hidden") === "true") return;

        const fav = localStorage.getItem(key + "_fav") === "true";
        if (mostrarFav && !fav) return;

        const peso = localStorage.getItem(key) || "";
        const hist = JSON.parse(localStorage.getItem(key + "_hist")) || [];
        const recorde = hist.length ? Math.max(...hist) : 0;
        const id = gerarId(m.nome);

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <h3>${m.nome} ${fav ? "⭐" : ""}</h3>
            <p>🏆 Recorde: ${recorde}kg</p>
            <input id="${id}" type="number" value="${peso}" placeholder="Kg">
            <button onclick="salvar('${m.nome}')">💾 Salvar</button>
            <div style="margin-top:10px">
                <button onclick="favoritar('${m.nome}')">${fav ? 'Remover ⭐' : 'Favoritar ⭐'}</button>
                <button onclick="verGrafico('${m.nome}')">📈</button>
            </div>
            <canvas id="graf-${id}" style="display:none"></canvas>
        `;
        lista.appendChild(card);
    });
}

function salvar(nome) {
    const input = document.getElementById(gerarId(nome));
    const val = input.value;
    if (!val) return;
    const key = getKey(nome);
    localStorage.setItem(key, val);
    let hist = JSON.parse(localStorage.getItem(key + "_hist")) || [];
    hist.push(Number(val));
    localStorage.setItem(key + "_hist", JSON.stringify(hist));
    render();
}

function favoritar(nome) {
    const key = getKey(nome) + "_fav";
    const estado = localStorage.getItem(key) === "true";
    localStorage.setItem(key, !estado);
    render();
}

function verGrafico(nome) {
    const id = "graf-" + gerarId(nome);
    const ctx = document.getElementById(id);
    const hist = JSON.parse(localStorage.getItem(getKey(nome) + "_hist")) || [];
    
    if (!hist.length) return alert("Sem histórico para este exercício.");
    
    ctx.style.display = "block";
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: hist.map((_, i) => "T" + (i + 1)),
            datasets: [{ label: "Peso", data: hist, borderColor: '#4285F4', backgroundColor: 'rgba(66, 133, 244, 0.2)', fill: true }]
        },
        options: { scales: { y: { beginAtZero: false } } }
    });
}

// Inicializa Service Worker e Render
if ("serviceWorker" in navigator) { navigator.serviceWorker.register("sw.js").catch(() => {}); }
render();

</script>
</body>
</html>
