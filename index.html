<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker PRO - Gabriel</title>
    <style>
        :root { --primary: #004dc5; --bg: #0a0a0a; --card: #141414; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        .search-bar { width: 100%; max-width: 500px; padding: 12px; border-radius: 20px; border: 1px solid #333; background: #111; color: white; margin: 0 auto 30px auto; display: block; text-align: center; }
        
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        
        /* Card idêntico ao seu print */
        .card { background: var(--card); border-radius: 15px; width: 280px; padding: 15px; border: 1px solid #222; position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--primary); }
        
        .badge { background: var(--primary); color: white; padding: 3px 10px; border-radius: 5px; font-size: 10px; font-weight: bold; position: absolute; top: 15px; left: 15px; z-index: 5; text-transform: uppercase; }
        
        /* Área da Imagem */
        .img-container { background: #000; border-radius: 10px; height: 160px; display: flex; align-items: center; justify-content: center; overflow: hidden; margin-bottom: 15px; border: 1px solid #1a1a1a; }
        .img-container img { width: 100%; height: 100%; object-fit: contain; }
        
        .title { font-size: 16px; font-weight: bold; margin-bottom: 15px; text-align: center; display: block; }
        
        .row { display: flex; gap: 8px; margin-bottom: 12px; }
        .col { flex: 1; text-align: center; }
        .col label { display: block; font-size: 10px; color: #888; margin-bottom: 4px; }
        .col input { width: 85%; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; color: white; padding: 10px; text-align: center; font-size: 14px; }

        .btn-save { background: var(--primary); color: white; border: none; width: 100%; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; text-transform: uppercase; }
        .btn-timer { background: transparent; color: #888; border: 1px solid #333; width: 100%; padding: 8px; border-radius: 8px; margin-top: 8px; font-size: 11px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; }
    </style>
</head>
<body>

<input type="text" id="busca" class="search-bar" placeholder="Buscar exercício..." oninput="render()">
<div class="container" id="lista"></div>

<script>
    const maquinas = [
        {id:"0289", nome:"Supino Reto (Halter)", grupo:"chest"},
        {id:"0047", nome:"Puxada Alta", grupo:"back"},
        {id:"0599", nome:"Leg Press 45", grupo:"upper legs"},
        {id:"0652", nome:"Rosca Direta", grupo:"upper arms"},
        {id:"0822", nome:"Tríceps Corda", grupo:"upper arms"}
    ];

    function render() {
        const lista = document.getElementById("lista");
        const termo = document.getElementById("busca").value.toLowerCase();
        lista.innerHTML = "";

        maquinas.filter(m => m.nome.toLowerCase().includes(termo)).forEach(m => {
            const peso = localStorage.getItem("gym_" + m.id + "_p") || 0;
            const meta = localStorage.getItem("gym_" + m.id + "_m") || 0;
            
            // Link 1: GitHub Raw (Mais rápido)
            const imgUrl = `https://raw.githubusercontent.com/yuhonas/free-exercise-db/main/exercises/${m.id}/visual.gif`;
            // Link 2: Fallback caso o 1 falhe
            const fallbackUrl = `https://edbtraingateway.com/image/${m.id}.gif`;

            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="badge">${m.grupo}</div>
                <div class="img-container">
                    <img src="${imgUrl}" 
                         onerror="this.onerror=null; this.src='${fallbackUrl}';" 
                         loading="lazy">
                </div>
                <span class="title">${m.nome}</span>
                <div class="row">
                    <div class="col"><label>Peso (kg)</label><input type="number" id="p-${m.id}" value="${peso}"></div>
                    <div class="col"><label>Meta (kg)</label><input type="number" id="m-${m.id}" value="${meta}"></div>
                </div>
                <button class="btn-save" onclick="salvar('${m.id}')">SALVAR PROGRESSO</button>
                <button id="t-${m.id}" class="btn-timer" onclick="timer(60, 't-${m.id}')">⏱️ Descanso 60s</button>
            `;
            lista.appendChild(card);
        });
    }

    function salvar(id) {
        localStorage.setItem("gym_" + id + "_p", document.getElementById("p-" + id).value);
        localStorage.setItem("gym_" + id + "_m", document.getElementById("m-" + id).value);
        alert("Salvo!");
    }

    function timer(seg, btnId) {
        const btn = document.getElementById(btnId);
        let t = seg; btn.disabled = true;
        const interval = setInterval(() => {
            btn.innerText = `⏳ ${t}s`; t--;
            if (t < 0) {
                clearInterval(interval);
                btn.innerText = "⏱️ Descanso 60s";
                btn.disabled = false;
            }
        }, 1000);
    }

    render();
</script>
</body>
</html>
