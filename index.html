// Inicialização segura
if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}
// 1. Inicialização com Persistência Local
const auth = firebase.auth();

// Força o Firebase a salvar o login no "disco" do celular, não na memória temporária
auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
  .then(() => {
    // 2. Captura o resultado do Redirect ANTES de qualquer outra coisa
    return auth.getRedirectResult();
  })
  .then((result) => {
    if (result && result.user) {
      console.log("Login recuperado após redirect!");
      render();
    }
  })
  .catch((error) => {
    console.error("Erro ao recuperar estado do login:", error);
    // Se der erro de "missing initial state", o Firebase limpa o lixo e permite tentar de novo
    if (error.code === 'auth/missing-android-pkg-name' || error.code === 'auth/missing-initial-state') {
        // Limpeza silenciosa para evitar o travamento da tela cinza
    }
  });

async function login() {
    const provider = new firebase.auth.GoogleAuthProvider();
    
    // Configuração para garantir que o Google trate como um navegador seguro
    provider.setCustomParameters({
        prompt: 'select_account'
    });

    try {
        // O signInWithRedirect tira o usuário da WebView e abre o navegador do sistema
        await auth.signInWithRedirect(provider);
    } catch (e) {
        console.error("Erro ao iniciar login:", e);
    }
}

// Captura o resultado quando o navegador devolve o usuário para o app
auth.getRedirectResult().then((result) => {
    if (result && result.user) {
        console.log("Login bem-sucedido!");
        render();
    }
}).catch(err => {
    console.error("Erro no retorno do login:", err);
});

// Captura retorno do Redirect (Essencial para APK e GitHub)
auth.getRedirectResult().then((result) => {
    if (result && result.user) {
        usuario = result.user.uid;
        localStorage.setItem("user_uid", result.user.uid);
        render();
    }
}).catch(console.error);

// Monitor de estado do usuário
auth.onAuthStateChanged(user => {
    const info = document.getElementById("user-info");
    const btnL = document.getElementById("btn-login");
    const btnO = document.getElementById("btn-logout");

    authPronta = true;

    if (user) {
        usuario = user.uid;
        localStorage.setItem("user_uid", user.uid);
        if(info) info.innerText = "✅ Logado: " + user.email;
        if(btnL) btnL.style.display = "none";
        if(btnO) btnO.style.display = "inline-block";
    } else {
        usuario = localStorage.getItem("user_uid") || "convidado";
        if(info) info.innerText = "⚠️ Modo Offline (Dados locais)";
        if(btnL) btnL.style.display = "inline-block";
        if(btnO) btnO.style.display = "none";
    }
    render();
});

function gerarId(nome) {
    return nome.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"_").replace(/[^\w]/g,"");
}

function getKey(nome) {
    return usuario + "_" + nome;
}

function setGrupo(g) { grupoAtual = g; mostrarFav = false; render(); }
function toggleFav() { mostrarFav = !mostrarFav; render(); }

function render() {
    const lista = document.getElementById("lista");
    if (!lista) return;

    if (!authPronta) {
        lista.innerHTML = "<p class='loading-text'>Sincronizando perfil...</p>";
        return;
    }

    const busca = document.getElementById("busca").value.toLowerCase();
    lista.innerHTML = "";

    const filtrados = maquinas.filter(m => 
        (grupoAtual === "todos" || m.grupo === grupoAtual) && 
        m.nome.toLowerCase().includes(busca)
    );

    filtrados.forEach(m => {
        const key = getKey(m.nome);
        const fav = localStorage.getItem(key + "_fav") === "true";
        if (mostrarFav && !fav) return;

        const peso = localStorage.getItem(key) || "";
        const hist = JSON.parse(localStorage.getItem(key + "_hist")) || [];
        const recorde = hist.length ? Math.max(...hist) : 0;
        const id = gerarId(m.nome);

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <h3>${m.nome} ${fav ? "⭐" : ""}</h3>
            <p>🏆 Recorde: <strong>${recorde}kg</strong></p>
            <input id="${id}" type="number" value="${peso}" placeholder="Kg">
            <button onclick="salvar('${m.nome}')">💾 Salvar</button>
            <div style="margin-top:10px">
                <button onclick="favoritar('${m.nome}')">${fav ? 'Remover ⭐' : 'Favoritar ⭐'}</button>
                <button onclick="verGrafico('${m.nome}')">📈 Gráfico</button>
            </div>
            <canvas id="graf-${id}" style="display:none"></canvas>
        `;
        lista.appendChild(card);
    });
}

function salvar(nome) {
    const id = gerarId(nome);
    const val = document.getElementById(id).value;
    if (!val) return;
    
    const key = getKey(nome);
    localStorage.setItem(key, val);
    
    let hist = JSON.parse(localStorage.getItem(key + "_hist")) || [];
    hist.push(Number(val));
    localStorage.setItem(key + "_hist", JSON.stringify(hist));
    
    alert("Peso salvo!");
    render();
}

function favoritar(nome) {
    const key = getKey(nome) + "_fav";
    const estado = localStorage.getItem(key) === "true";
    localStorage.setItem(key, !estado);
    render();
}

function verGrafico(nome) {
    const idCanvas = "graf-" + gerarId(nome);
    const ctx = document.getElementById(idCanvas);
    const hist = JSON.parse(localStorage.getItem(getKey(nome) + "_hist")) || [];
    
    if (!hist.length) return alert("Sem histórico para este exercício.");
    
    ctx.style.display = "block";
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: hist.map((_, i) => "Sessão " + (i + 1)),
            datasets: [{ 
                label: "Peso (kg)", 
                data: hist, 
                borderColor: '#4285F4', 
                backgroundColor: 'rgba(66, 133, 244, 0.2)', 
                fill: true,
                tension: 0.3
            }]
        },
        options: { scales: { y: { beginAtZero: false } } }
    });
}

// Inicializa Service Worker para PWA
if ("serviceWorker" in navigator) { 
    navigator.serviceWorker.register("sw.js").catch(() => {}); 
}

// Primeiro render
render();
