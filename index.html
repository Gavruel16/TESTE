<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gym Tracker PRO</title>
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: white; text-align: center; margin: 0; padding: 20px; }
        h1 { color: #4285F4; margin-bottom: 5px; }
        input { padding: 10px; border-radius: 8px; border: none; margin: 5px; width: 85px; background: #333; color: white; font-size: 16px; }
        button { padding: 10px 15px; margin: 5px; border: none; border-radius: 8px; background: #2a2a2a; color: white; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #444; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
        .card { background: #1a1a1a; padding: 15px; border-radius: 12px; width: 280px; border: 1px solid #333; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        #user-info { margin: 15px; font-size: 0.9em; color: #aaa; min-height: 1.2em; }
        .btn-google { background: #4285F4; color: white; }
        .btn-google:hover { background: #357ae8; }
        canvas { max-width: 100%; margin-top: 15px; background: #111; border-radius: 8px; padding: 5px; }
        .loading-text { font-style: italic; color: #4285F4; }
        .search-bar { width: 90%; max-width: 400px; padding: 12px; border-radius: 25px; background: #222; border: 1px solid #444; color: white; margin-bottom: 20px; }
    </style>
</head>
<body>

<h1>🏋️ Gym Tracker PRO</h1>

<div id="auth-section">
    <div id="user-info" class="loading-text">Iniciando...</div>
    <button id="btn-login" class="btn-google" onclick="login()" style="display:none;">🔐 Entrar com Google</button>
    <button id="btn-logout" onclick="logout()" style="display:none;">🚪 Sair</button>
</div>

<div id="app">
    <input type="text" id="busca" class="search-bar" placeholder="Buscar exercício (Ex: Supino)..." oninput="render()">
    
    <div style="margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: center; gap: 5px;">
        <button onclick="setGrupo('todos')">Todos</button>
        <button onclick="setGrupo('peito')">Peito</button>
        <button onclick="setGrupo('costas')">Costas</button>
        <button onclick="setGrupo('biceps')">Bíceps</button>
        <button onclick="setGrupo('triceps')">Tríceps</button>
        <button onclick="setGrupo('perna')">Perna</button>
        <button onclick="setGrupo('ombro')">Ombro</button>
        <button onclick="setGrupo('peso_livre')">Peso Livre</button>
        <button onclick="toggleFav()">⭐ Fav</button>
    </div>

    <div class="container" id="lista"></div>
</div>

<script>
// 1. CONFIGURAÇÃO SUPABASE
const supabaseUrl = 'https://bhopmzhxhalotusoifiq.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJob3Btemh4aGFsb3R1c29pZmlxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3NDExMTgsImV4cCI6MjA5MDMxNzExOH0.TJQ2jN3QDzciqTbA0AXIBPiJ5ymIQp7j2i1-MlucZ8k';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

let usuario = localStorage.getItem("user_id") || "convidado";
let authPronta = false;

// 2. FUNÇÕES DE AUTENTICAÇÃO
async function login() {
    const { error } = await _supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin }
    });
    if (error) alert("Erro: " + error.message);
}

async function logout() {
    await _supabase.auth.signOut();
    localStorage.clear();
    location.reload();
}

// 3. MONITOR DE ESTADO
_supabase.auth.onAuthStateChange((event, session) => {
    const info = document.getElementById("user-info");
    const btnL = document.getElementById("btn-login");
    const btnO = document.getElementById("btn-logout");

    authPronta = true;

    if (session) {
        usuario = session.user.id;
        localStorage.setItem("user_id", usuario);
        if(info) info.innerText = "✅ Logado: " + session.user.email;
        if(btnL) btnL.style.display = "none";
        if(btnO) btnO.style.display = "inline-block";
        carregarDadosNuvem(); 
    } else {
        usuario = "convidado";
        if(info) info.innerText = "⚠️ Modo Offline (Dados locais)";
        if(btnL) btnL.style.display = "inline-block";
        if(btnO) btnO.style.display = "none";
    }
    render();
});

// 4. FUNÇÃO SALVAR
async function salvar(nome) {
    const idInput = gerarId(nome);
    const pesoValue = document.getElementById(idInput).value;
    if (!pesoValue) return;

    const key = usuario + "_" + nome;
    localStorage.setItem(key, pesoValue);

    let hist = JSON.parse(localStorage.getItem(key + "_hist")) || [];
    hist.push(Number(pesoValue));
    localStorage.setItem(key + "_hist", JSON.stringify(hist));

    if (usuario !== "convidado") {
        await _supabase.from('treinos').upsert({ 
            user_id: usuario, exercicio: nome, peso: parseInt(pesoValue) 
        }, { onConflict: 'user_id, exercicio' });
    }
    render();
    alert("Salvo!");
}

// 5. CARREGAR NUVEM
async function carregarDadosNuvem() {
    if (usuario === "convidado") return;
    const { data } = await _supabase.from('treinos').select('*').eq('user_id', usuario);
    if (data) {
        data.forEach(item => {
            const key = usuario + "_" + item.exercicio;
            localStorage.setItem(key, item.peso);
        });
        render();
    }
}

// 6. DADOS DOS EXERCÍCIOS
let grupoAtual = "todos";
let mostrarFav = false;
const maquinas = [
    {nome:"Supino Reto Máquina",grupo:"peito"}, {nome:"Supino Inclinado Máquina",grupo:"peito"},
    {nome:"Puxada Alta",grupo:"costas"}, {nome:"Remada Baixa",grupo:"costas"},
    {nome:"Rosca Direta Barra",grupo:"biceps"}, {nome:"Rosca Martelo",grupo:"biceps"},
    {nome:"Tríceps Polia",grupo:"triceps"}, {nome:"Tríceps Corda",grupo:"triceps"},
    {nome:"Leg Press 45°",grupo:"perna"}, {nome:"Cadeira Extensora",grupo:"perna"},
    {nome:"Desenvolvimento Halter",grupo:"ombro"}, {nome:"Elevação Lateral",grupo:"ombro"},
    {nome:"Esteira",grupo:"cardio"}, {nome:"Bicicleta",grupo:"cardio"}
    // ... Adicione mais aqui se precisar
];

function gerarId(nome) {
    return nome.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/\s+/g,"_").replace(/[^\w]/g,"");
}

function getKey(nome) { return usuario + "_" + nome; }
function setGrupo(g) { grupoAtual = g; render(); }
function toggleFav() { mostrarFav = !mostrarFav; render(); }

function render() {
    const lista = document.getElementById("lista");
    if (!lista) return;

    const busca = document.getElementById("busca").value.toLowerCase();
    lista.innerHTML = "";

    const filtrados = maquinas.filter(m => 
        (grupoAtual === "todos" || m.grupo === grupoAtual) && 
        m.nome.toLowerCase().includes(busca)
    );

    filtrados.forEach(m => {
        const key = getKey(m.nome);
        const fav = localStorage.getItem(key + "_fav") === "true";
        if (mostrarFav && !fav) return;

        const peso = localStorage.getItem(key) || "";
        const hist = JSON.parse(localStorage.getItem(key + "_hist")) || [];
        const recorde = hist.length ? Math.max(...hist) : 0;
        const id = gerarId(m.nome);

        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
            <h3>${m.nome} ${fav ? "⭐" : ""}</h3>
            <p>🏆 Recorde: <strong>${recorde}kg</strong></p>
            <input id="${id}" type="number" value="${peso}" placeholder="Kg">
            <button onclick="salvar('${m.nome}')">💾 Salvar</button>
            <div style="margin-top:10px">
                <button onclick="favoritar('${m.nome}')">${fav ? 'Remover ⭐' : 'Favoritar ⭐'}</button>
                <button onclick="verGrafico('${m.nome}')">📈 Gráfico</button>
            </div>
            <canvas id="graf-${id}" style="display:none"></canvas>
        `;
        lista.appendChild(card);
    });
}

function favoritar(nome) {
    const key = getKey(nome) + "_fav";
    localStorage.setItem(key, localStorage.getItem(key) !== "true");
    render();
}

function verGrafico(nome) {
    const id = gerarId(nome);
    const ctx = document.getElementById("graf-" + id);
    const hist = JSON.parse(localStorage.getItem(getKey(nome) + "_hist")) || [];
    if (!hist.length) return alert("Sem histórico.");
    ctx.style.display = "block";
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: hist.map((_, i) => i + 1),
            datasets: [{ label: "kg", data: hist, borderColor: '#4285F4' }]
        }
    });
}

render();
</script>
</body>
</html>
